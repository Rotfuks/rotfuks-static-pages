name: Deploy to rotfuks.de

# Build the VitePress site and push it to the FTP host on every change to main.
on:
  push:
    branches: [main]
  # Allow running the deploy manually from the Actions tab too.
  workflow_dispatch:

# Avoid overlapping deploys; a newer commit cancels an in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run docs:build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Mirror dist/ to the FTP root: uploads changed files and deletes ones
      # removed locally (--delete), so the server always matches the build.
      # lftp is far more tolerant of quirky FTP servers than basic-ftp clients.
      - name: Deploy via FTP (mirror)
        env:
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set cmd:fail-exit true;
          set net:max-retries 3;
          set net:timeout 20;
          set ftp:ssl-allow true;
          set ftp:ssl-force false;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          set ftp:list-options -a;
          open --env-password -u deploy-service ftp.rotfuks.de;
          mirror --reverse --delete --verbose ./content/.vitepress/dist/ /;
          "
